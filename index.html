<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala Situacional - Alcaldía de Charallave</title>
    <style>
        :root {
            --rojo-psuv: #E30613;
            --azul-institucional: #004a99;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://pbs.twimg.com/media/FIn7Wv9XIAI6U1W.jpg');
            background-size: cover;
            background-position: center;
        }
        .login-container {
            background-color: rgba(255, 255, 255, 0.98);
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border-top: 8px solid var(--rojo-psuv);
        }
        .gob-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .gob-header img { height: 50px; }

        /* Banner de la Alcaldesa Yuhismar Hernández */
        .alcaldesa-banner {
            background: #fdf2f2;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            text-align: left;
        }
        .alcaldesa-banner img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            margin-right: 12px;
            border: 2px solid var(--rojo-psuv);
            background-color: #eee;
        }
        .alcaldesa-banner h4 { margin: 0; color: var(--rojo-psuv); font-size: 15px; }
        .alcaldesa-banner p { margin: 0; font-size: 11px; color: #555; font-weight: bold; }

        h2 { color: #333; margin: 5px 0; font-size: 20px; letter-spacing: 1px; }
        .slogan { color: var(--rojo-psuv); font-weight: bold; font-size: 13px; margin-bottom: 20px; text-transform: uppercase; }
        
        label { display: block; text-align: left; margin-top: 15px; font-weight: bold; color: #444; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--rojo-psuv);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
            margin-top: 25px;
            transition: 0.3s;
        }
        button:hover { background-color: #b7050f; }
        
        .footer {
            margin-top: 25px;
            font-size: 10px;
            color: #888;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
        .error-message { color: var(--rojo-psuv); font-size: 12px; margin-top: 10px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="gob-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Flag_of_the_United_Socialist_Party_of_Venezuela.svg/1200px-Flag_of_the_United_Socialist_Party_of_Venezuela.svg.png" alt="PSUV">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/Escudo_Crist%C3%B3bal_Rojas.png" alt="Escudo Cristóbal Rojas">
        </div>

        <div class="alcaldesa-banner">
            <img src="https://miranda.gob.ve/wp-content/uploads/2024/02/yuhismar-hernandez.jpg" alt="Yuhismar Hernández" onerror="this.src='https://via.placeholder.com/60?text=YH'">
            <div>
                <h4>Yuhismar Hernández</h4>
                <p>Alcaldesa de Cristóbal Rojas</p>
                <p style="color: #004a99;">Gestión 2025 - 2029</p>
            </div>
        </div>

        <h2>SALA SITUACIONAL</h2>
        <p class="slogan">¡Palabra de Mujer, Compromiso de Pueblo!</p>
        
        <form id="loginForm">
            <label for="username">Usuario:</label>
            <input type="text" id="username" placeholder="Tu usuario institucional" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" placeholder="••••••••" required>

            <p class="error-message" id="errorMsg">Usuario o clave inválida. Intente de nuevo.</p>

            <button type="submit">ACCEDER</button>
        </form>

        <div class="footer">
            MUNICIPIO BOLIVARIANO CRISTÓBAL ROJAS <br>
            Secretaría de Comunas y Gestión Social
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEqiu5ypPSGbS6nzju6VZtd2RIRYRDmGU",
            authDomain: "alcaldia-admin.firebaseapp.com",
            databaseURL: "https://alcaldia-admin-default-rtdb.firebaseio.com",
            projectId: "alcaldia-admin",
            storageBucket: "alcaldia-admin.firebasestorage.app",
            messagingSenderId: "945828226894",
            appId: "1:945828226894:web:0efeebeb270357e6f5201f",
            measurementId: "G-P4QSQR0XGE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (user.email === "carlos.admin@alcaldia.com") {
                    window.location.href = "admin.html";
                } else {
                    window.location.href = "registro.html";
                }
            }
        });

        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const emailFalso = username + "@alcaldia.com";

            signInWithEmailAndPassword(auth, emailFalso, password)
                .then((userCredential) => {
                    if (userCredential.user.email === "carlos.admin@alcaldia.com") {
                        window.location.href = "admin.html";
                    } else {
                        window.location.href = "registro.html";
                    }
                })
                .catch((error) => {
                    errorMsg.style.display = "block";
                });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala Situacional - Alcaldía de Charallave</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Flag_of_the_United_Socialist_Party_of_Venezuela.svg/1200px-Flag_of_the_United_Socialist_Party_of_Venezuela.svg.png');
            background-size: cover;
            background-position: center;
        }
        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 8px solid #E30613; /* Rojo PSUV */
        }
        .logos {
            margin-bottom: 20px;
        }
        .logos h2 {
            color: #E30613;
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
        }
        .logos p {
            color: #555;
            font-size: 14px;
            margin-top: 5px;
            font-weight: bold;
        }
        label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
            margin-top: 15px;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #E30613;
            color: white;
            padding: 15px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover {
            background-color: #b7050f;
        }
        .error-message {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logos">
            <h2>Alcaldía de Charallave</h2>
            <p>SALA SITUACIONAL MUNICIPAL | PSUV</p>
        </div>
        
        <form id="loginForm">
            <label for="email">Usuario Institucional:</label>
            <input type="email" id="email" placeholder="ejemplo@alcaldia.com" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" placeholder="Ingresa tu contraseña" required>

            <p class="error-message" id="errorMsg">Usuario o contraseña incorrectos.</p>

            <button type="submit">Ingresar al Sistema</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        // Tus credenciales
        const firebaseConfig = {
            apiKey: "AIzaSyCEqiu5ypPSGbS6nzju6VZtd2RIRYRDmGU",
            authDomain: "alcaldia-admin.firebaseapp.com",
            databaseURL: "https://alcaldia-admin-default-rtdb.firebaseio.com",
            projectId: "alcaldia-admin",
            storageBucket: "alcaldia-admin.firebasestorage.app",
            messagingSenderId: "945828226894",
            appId: "1:945828226894:web:0efeebeb270357e6f5201f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Intentar iniciar sesión
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Si es exitoso, redirigir a la página de registro
                    window.location.href = "registro.html";
                })
                .catch((error) => {
                    // Si falla, mostrar error
                    console.error(error.message);
                    errorMsg.style.display = "block";
                });
        });
    </script>
</body>
</html>

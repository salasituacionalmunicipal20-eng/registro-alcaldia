<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala Situacional - Alcaldía de Charallave</title>
    <style>
        :root {
            --rojo-psuv: #E30613;
            --azul-institucional: #004a99;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), 
                        url('https://pbs.twimg.com/media/FIn7Wv9XIAI6U1W.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .login-container {
            background-color: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border-top: 10px solid var(--rojo-psuv);
        }
        /* Actualizamos para usar tus fotos locales */
        .gob-header {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 30px;
        }
        .gob-header img { 
            height: 80px; 
            object-fit: contain;
        }

        .institucion-titulo {
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        h2 { color: #333; margin: 5px 0; font-size: 24px; letter-spacing: 1px; font-weight: 800; }
        .slogan { color: var(--rojo-psuv); font-weight: bold; font-size: 14px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        label { display: block; text-align: left; margin-top: 15px; font-weight: bold; color: #444; font-size: 14px; }
        input {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            background-color: var(--rojo-psuv);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
            margin-top: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { background-color: #b7050f; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
        
        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: #777;
            border-top: 1px solid #eee;
            padding-top: 15px;
            line-height: 1.5;
        }
        .error-message { color: var(--rojo-psuv); font-size: 13px; margin-top: 15px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="gob-header">
            <img src="psuv.jpg" alt="PSUV">
            <img src="escudo municipal.jpg" alt="Escudo Cristóbal Rojas">
        </div>

        <div class="institucion-titulo">
            <h2>ALCALDÍA DE CRISTÓBAL ROJAS</h2>
            <p style="margin: 0; color: var(--azul-institucional); font-weight: bold; font-size: 14px;">GESTIÓN YUHISMAR HERNÁNDEZ</p>
        </div>

        <h2>SALA SITUACIONAL</h2>
        <p class="slogan">¡Palabra de Mujer, Compromiso de Pueblo!</p>
        
        <form id="loginForm">
            <label for="username">Usuario Institucional:</label>
            <input type="text" id="username" placeholder="Ingresa tu usuario" required autocomplete="username">

            <label for="password">Contraseña:</label>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">

            <p class="error-message" id="errorMsg">Acceso denegado. Verifique sus datos.</p>

            <button type="submit">INGRESAR AL SISTEMA</button>
        </form>

        <div class="footer">
            MUNICIPIO BOLIVARIANO CRISTÓBAL ROJAS - CHARALLAVE <br>
            <strong>SECRETARÍA DE COMUNAS Y GESTIÓN SOCIAL</strong>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        // CONFIGURACIÓN DE TU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCEqiu5ypPSGbS6nzju6VZtd2RIRYRDmGU",
            authDomain: "alcaldia-admin.firebaseapp.com",
            databaseURL: "https://alcaldia-admin-default-rtdb.firebaseio.com",
            projectId: "alcaldia-admin",
            storageBucket: "alcaldia-admin.firebasestorage.app",
            messagingSenderId: "945828226894",
            appId: "1:945828226894:web:0efeebeb270357e6f5201f",
            measurementId: "G-P4QSQR0XGE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Lógica de redirección basada en roles (Manteniendo Regla de Oro)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (user.email === "carlos.admin@alcaldia.com") {
                    window.location.href = "admin.html";
                } else {
                    window.location.href = "registro.html";
                }
            }
        });

        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // Enmascaramiento de correo para Firebase
            const emailFalso = username + "@alcaldia.com";

            signInWithEmailAndPassword(auth, emailFalso, password)
                .then((userCredential) => {
                    if (userCredential.user.email === "carlos.admin@alcaldia.com") {
                        window.location.href = "admin.html";
                    } else {
                        window.location.href = "registro.html";
                    }
                })
                .catch((error) => {
                    errorMsg.style.display = "block";
                });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Contraseña - Alcaldía</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; border-top: 8px solid #E30613; }
        h2 { color: #E30613; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #E30613; color: white; padding: 15px; border: none; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Primer Inicio de Sesión</h2>
        <p>Por seguridad, debe cambiar la clave genérica por una nueva.</p>
        <form id="pwForm">
            <input type="password" id="newPw" placeholder="Nueva Contraseña (mín. 6 caracteres)" required minlength="6">
            <input type="password" id="confirmPw" placeholder="Confirmar Contraseña" required minlength="6">
            <p id="errorMsg" style="color: red; display: none;">Las contraseñas no coinciden.</p>
            <button type="submit">ACTUALIZAR Y ENTRAR</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEqiu5ypPSGbS6nzju6VZtd2RIRYRDmGU",
            authDomain: "alcaldia-admin.firebaseapp.com",
            databaseURL: "https://alcaldia-admin-default-rtdb.firebaseio.com",
            projectId: "alcaldia-admin",
            storageBucket: "alcaldia-admin.firebasestorage.app",
            messagingSenderId: "945828226894",
            appId: "1:945828226894:web:0efeebeb270357e6f5201f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "index.html";
        });

        document.getElementById('pwForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPw = document.getElementById('newPw').value;
            const confirmPw = document.getElementById('confirmPw').value;

            if (newPw !== confirmPw) {
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }

            try {
                // 1. Actualizar contraseña en Authentication
                await updatePassword(auth.currentUser, newPw);
                // 2. Actualizar flag en Database
                await update(ref(database, 'operadores/' + auth.currentUser.uid), {
                    cambio_obligatorio: false
                });
                alert("¡Contraseña actualizada!");
                window.location.href = "registro.html";
            } catch (error) {
                alert("Error: " + error.message);
            }
        });
    </script>
</body>
</html>
